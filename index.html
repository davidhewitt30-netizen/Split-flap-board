<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Daily Itinerary</title>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #2a2a2a;      /* Dark Grey */
      --flap-bg: #000000;       /* Black */
      --line-color: #1a1a1a;    /* Split line */
    }
    body { 
      background: var(--bg-color);
      font-family: 'Cabin', sans-serif; 
      margin: 0; padding: 3vw; overflow-x: hidden;
    }
    .header-row { 
      display: flex; margin-bottom: 2vh; 
      color: #888888; font-size: 2vw; 
      text-transform: uppercase; border-bottom: 2px solid #444444;
      padding-bottom: 1vh;
    }
    
    .event-group {
      margin-bottom: 2.5vh;
      border-bottom: 1px dashed #444;
      padding-bottom: 2vh;
    }
    .row { display: flex; gap: 1.5vw; margin-bottom: 1vh; align-items: center; }
    .col { display: flex; gap: 0.3vw; }
    
    /* New Layout Widths */
    .time-col { width: 14vw; }
    .spacer-col { width: 14vw; } /* Empty space under the time */
    .text-col { width: 75vw; }   /* Massive column for Event & Location */

    .flap {
      background: var(--flap-bg); 
      width: 2.3vw; height: 3.8vw; line-height: 3.8vw;
      text-align: center; font-size: 2.5vw; font-weight: 600;
      border-radius: 4px; position: relative;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }
    .flap::after { 
      content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; 
      background: var(--line-color); z-index: 5;
    }

    /* Multi-Calendar Colors */
    .color-white .flap { color: #ffffff; text-shadow: 0 0 4px rgba(255,255,255,0.2); }
    .color-blue .flap { color: #4da8da; text-shadow: 0 0 5px rgba(77,168,218,0.4); }
    .color-purple .flap { color: #b19cd9; text-shadow: 0 0 5px rgba(177,156,217,0.4); }

    .flipping { animation: flip 0.08s linear; }
    @keyframes flip { 0% { transform: scaleY(1); } 50% { transform: scaleY(0.5); } 100% { transform: scaleY(1); } }
  </style>
</head>
<body>
  <div class="header-row">
    <div class="time-col">Time</div>
    <div class="text-col">Event & Location</div>
  </div>
  <div id="board"></div>

<script>
  const characters = " ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789:/-.,!?()'";

  function createFlaps(text, length, container, colorClass = "") {
    const cleanText = text.toString().toUpperCase().split('').filter(char => characters.includes(char)).join('');
    const padded = cleanText.substring(0, length).padEnd(length, ' ');
    
    const colDiv = document.createElement('div');
    colDiv.className = `col ${colorClass}`;
    
    const flaps = padded.split('').map(char => {
      const el = document.createElement('div');
      el.className = 'flap'; el.innerText = ' ';
      colDiv.appendChild(el);
      return { el, target: char, currentIdx: 0 };
    });
    container.appendChild(colDiv);
    animate(flaps);
  }

  function animate(flaps) {
    function step() {
      let done = true;
      flaps.forEach(f => {
        if (characters[f.currentIdx] !== f.target) {
          done = false;
          f.currentIdx = (f.currentIdx + 1) % characters.length;
          f.el.innerText = characters[f.currentIdx];
          f.el.classList.add('flipping');
          setTimeout(() => f.el.classList.remove('flipping'), 35); // Slightly faster animation for larger board
        }
      });
      if (!done) setTimeout(step, 45);
    }
    step();
  }

  fetch('/api/events')
    .then(response => response.json())
    .then(data => {
      const board = document.getElementById('board');
      board.innerHTML = ''; 
      
      if(data.length === 0) {
        board.innerHTML = "<div style='color: #999; font-size: 3vw; margin-top: 5vh;'>NO EVENTS TODAY</div>";
        return;
      }

      data.forEach(row => {
        // Container for the whole event (applies the color class to all flaps inside)
        const groupDiv = document.createElement('div');
        groupDiv.className = `event-group color-${row.color}`;
        
        // --- TOP ROW: TIME & EVENT ---
        const topRow = document.createElement('div');
        topRow.className = 'row';
        createFlaps(row.time, 5, topRow, 'time-col');
        createFlaps(row.title, 25, topRow, 'text-col'); // 25 flaps for the title!
        groupDiv.appendChild(topRow);

        // --- BOTTOM ROW: LOCATION (Only renders if a location exists) ---
        if (row.location && row.location.trim().length > 0) {
          const botRow = document.createElement('div');
          botRow.className = 'row';
          
          // Add empty space under the Time column to align the location perfectly
          const spacer = document.createElement('div');
          spacer.className = 'spacer-col';
          botRow.appendChild(spacer);
          
          createFlaps("LOC: " + row.location, 25, botRow, 'text-col'); // 25 flaps for location!
          groupDiv.appendChild(botRow);
        }

        board.appendChild(groupDiv);
      });
    });
    
    setInterval(() => location.reload(), 15 * 60 * 1000);
</script>
</body>
</html>
