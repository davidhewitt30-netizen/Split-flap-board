<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Daily Itinerary</title>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* New Dark Palette */
      --bg-color: #2a2a2a;      /* Dark Grey */
      --flap-bg: #000000;       /* Black */
      --text-color: #ffffff;    /* White */
      --line-color: #1a1a1a;    /* Subtle dark split line */
    }
    body { 
      background: var(--bg-color);
      color: var(--text-color); 
      font-family: 'Cabin', sans-serif; 
      margin: 0; 
      padding: 3vw; 
      overflow-x: hidden;
    }
    .header-row { 
      display: flex; gap: 1vw; margin-bottom: 2vh; 
      color: #999999; font-size: 2vw; 
      text-transform: uppercase; border-bottom: 2px solid #555555;
      padding-bottom: 1vh;
    }
    .row { display: flex; gap: 1.5vw; margin-bottom: 1.5vh; align-items: center; }
    .col { display: flex; gap: 0.3vw; }
    
    /* Adjusted widths for more flaps */
    .time-col { width: 12vw; }
    .event-col { width: 48vw; }
    .loc-col { width: 30vw; }

    .flap {
      background: var(--flap-bg); 
      width: 2.2vw; /* Narrower to fit more */
      height: 3.8vw; 
      line-height: 3.8vw;
      text-align: center; 
      font-size: 2.5vw; 
      font-weight: 600;
      border-radius: 4px; 
      position: relative;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }
    .flap::after { 
      content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; 
      background: var(--line-color); z-index: 5;
    }
    .flipping { animation: flip 0.08s linear; }
    @keyframes flip { 0% { transform: scaleY(1); } 50% { transform: scaleY(0.5); } 100% { transform: scaleY(1); } }
  </style>
</head>
<body>
  <div class="header-row">
    <div class="time-col">Time</div>
    <div class="event-col">Event</div>
    <div class="loc-col">Location</div>
  </div>
  <div id="board"></div>

<script>
  // Added a few extra punctuation marks just in case
  const characters = " ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789:/-.,!?()'";

  function createFlaps(text, length, container, colorClass = "") {
    // 1. EMOJI STRIPPER: Removes anything not in the 'characters' list above
    const cleanText = text.toString().toUpperCase().split('').filter(char => characters.includes(char)).join('');
    
    // 2. Pad or chop to the exact length needed
    const padded = cleanText.substring(0, length).padEnd(length, ' ');
    
    const colDiv = document.createElement('div');
    colDiv.className = `col ${colorClass}`;
    
    const flaps = padded.split('').map(char => {
      const el = document.createElement('div');
      el.className = 'flap'; el.innerText = ' ';
      colDiv.appendChild(el);
      return { el, target: char, currentIdx: 0 };
    });
    container.appendChild(colDiv);
    animate(flaps);
  }

  function animate(flaps) {
    function step() {
      let done = true;
      flaps.forEach(f => {
        if (characters[f.currentIdx] !== f.target) {
          done = false;
          f.currentIdx = (f.currentIdx + 1) % characters.length;
          f.el.innerText = characters[f.currentIdx];
          f.el.classList.add('flipping');
          setTimeout(() => f.el.classList.remove('flipping'), 40);
        }
      });
      if (!done) setTimeout(step, 50);
    }
    step();
  }

  fetch('/api/events')
    .then(response => response.json())
    .then(data => {
      const board = document.getElementById('board');
      board.innerHTML = ''; 
      
      if(data.length === 0) {
        board.innerHTML = "<div style='color: #999; font-size: 3vw; margin-top: 5vh;'>NO EVENTS TODAY</div>";
        return;
      }

      data.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'row';
        // Increased the flap counts: Time (5), Event (20), Location (12)
        createFlaps(row.time, 5, rowDiv, 'time-col');
        createFlaps(row.title, 20, rowDiv, 'event-col');
        createFlaps(row.location, 12, rowDiv, 'loc-col');
        board.appendChild(rowDiv);
      });
    });
    
    setInterval(() => location.reload(), 15 * 60 * 1000);
</script>
</body>
</html>
